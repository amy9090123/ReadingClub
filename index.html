<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不屬靈讀書會進度查詢系統</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-light: #eff6ff;
            --success: #10b981;
            --success-light: #ecfdf5;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --border: #e2e8f0;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
            position: relative;
        }

        header {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        header .book-title {
            color: #38bdf8;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .admin-panel {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
        }

        .admin-panel h2 {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .member-list-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 13px;
            color: #e2e8f0;
        }

        .member-tag {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 6px;
        }

        /* 載入中遮罩 */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: var(--text-main);
            font-size: 16px;
            transition: opacity 0.3s;
        }

        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 卡片列表 */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            position: relative;
        }

        .card.holiday-active {
            background-color: var(--danger-light);
            border-color: #fecaca;
        }

        .card.substitute-active {
            border-left: 5px solid var(--warning);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-date {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .card.holiday-active .card-date {
            color: var(--danger);
        }

        .badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .badge-chapter {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .badge-holiday {
            background-color: var(--danger);
            color: white;
        }

        .card-body {
            margin-bottom: 16px;
        }

        .book-info {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .chapter-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.4;
        }

        .card-footer {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
        }

        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .select-leader {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            background-color: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: 8px;
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        .select-wrapper::after {
            content: "▾";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 12px;
        }

        .switch-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            user-select: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(20px); }
        .switch-note input:checked + .slider { background-color: var(--primary); }

        .status-tag {
            position: absolute;
            top: 18px;
            right: 18px;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .tag-sub {
            background-color: var(--warning-light);
            color: #b45309;
            border: 1px solid #fde68a;
        }

        .note-textarea {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            outline: none;
            background-color: #f8fafc;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay"><div class="spinner"></div>雲端資料同步中...</div>

    <div class="app-container">
        <header>
            <h1>讀書會排班查詢系統</h1>
            <div class="book-title">📖 <span>為什麼我們沒離婚</span></div>
            <div class="admin-panel">
                <h2>核心成員輪值順序</h2>
                <div class="member-list-display" id="memberDisplay"></div>
            </div>
        </header>

        <div class="card-list" id="cardListContainer"></div>
    </div>

    <script>
        // ==========================================
        // 填入您的 Google Apps Script 部署網址
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbyhzqj4Vr7EIVySreYfdoNK60imcdUf-JYXsummyk9mnYngXg-ApiKnqY_jjvbDVTdL7w/exec"; 

        const START_DATE_STR = '2026-07-13'; 
        const TOTAL_CHAPTERS = 30;
        const BOOK_NAME = "為什麼我們沒離婚";
        
        const CHAPTER_TITLES = [
            "01. 分裂—當愛說不出口", "02. 不合—通常簡稱為個性", "03. 轉機—幸福不能靠運氣",
            "04. 道歉—終於聽到我開口了", "05. 醫治—神奇的夫妻營", "06. 溝通—話何必要說得那麼明白？",
            "07. 平權—走得更長的婚姻角色", "08. 合一—從薪合一", "09. 獨居—那人獨居不好",
            "10. 和好—父母關係好，孩子才會好", "11. 信仰—不能同心，焉能同行？", "12. 姻親—婚姻中的陽光",
            "13. 我們—讓二人合為一的小動作", "14. 男女—顧事情與顧心情", "15. 親密—從言語到身體",
            "16. 改變—從老公做家事的心態開始", "17. 試探—不要以為自己能免除", "18. 格局—這樣的男人成不了大事",
            "19. 罩門—每個人都有弱點", "20. 承擔—丈夫是妻子的頭", "21. 期待—以正面眼光看另一半",
            "22. 讚美—婚姻延長保固的特效藥", "23. 示愛—用行動讓另一半感受被愛", "24. 感恩—得著幸福感的祕訣",
            "25. 速配—多學一點不吃虧", "26. 快樂—兩個人也可以自由", "27. 祕密—不說事情才大條",
            "28. 幫助—頭需要脖子的扶持", "29. 空巢—重拾兩個人的自由", "30. 現在—活在當下的美好"
        ];

        let state = {
            members: ['韻蓉', '阿虹', '慕潔', '佳馨', '小馬', '阿丁'],
            holidays: [], 
            substitutes: {}, 
            notes: {}, 
            noteToggles: {}
        };

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // 從雲端 Google Sheets 讀取最新資料
        async function fetchCloudData() {
            if (!API_URL || API_URL.includes("請在此處貼上")) {
                showLoading(false);
                renderSchedule();
                return;
            }
            try {
                showLoading(true);
                // 加上時間戳記，絕對不拿舊資料
                const targetUrl = `${API_URL}?t=${new Date().getTime()}`;
                const response = await fetch(targetUrl);
                const cloudData = await response.json();
                
                state.holidays = [];
                state.substitutes = {};
                state.notes = {};

                cloudData.forEach(item => {
                    let dateStr = String(item.date).trim();
                    // 強制轉回純日期格式，消除所有隱藏的時間碼
                    if (dateStr.includes('T')) {
                        dateStr = dateStr.split('T')[0];
                    }
                    
                    if (item.type === 'holiday') state.holidays.push(dateStr);
                    if (item.type === 'substitute') state.substitutes[dateStr] = item.value;
                    if (item.type === 'note') state.notes[dateStr] = item.value;
                });
            } catch (error) {
                console.error("讀取雲端失敗:", error);
            } finally {
                showLoading(false);
                renderSchedule();
            }
        }

        // 將變更寫入雲端 Google Sheets
        async function saveToCloud(action, type, date, value = '') {
            if (!API_URL || API_URL.includes("請在此處貼上")) return;
            try {
                const targetUrl = `${API_URL}?action=${action}&type=${type}&date=${date}&value=${encodeURIComponent(value)}&t=${new Date().getTime()}`;
                await fetch(targetUrl);
            } catch (error) {
                console.error("同步至雲端失敗:", error);
            }
        }

        function formatDate(date) {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function addDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + days);
            return result;
        }

        function initMemberHeader() {
            const container = document.getElementById('memberDisplay');
            container.innerHTML = '';
            state.members.forEach((name, i) => {
                const tag = document.createElement('span');
                tag.className = 'member-tag';
                tag.innerText = `${i+1}. ${name}`;
                container.appendChild(tag);
            });
        }

        function renderSchedule() {
            const container = document.getElementById('cardListContainer');
            container.innerHTML = '';

            let currentDate = new Date(START_DATE_STR);
            let currentChapter = 1;
            let activeSessionCount = 0; 

            while (currentChapter <= TOTAL_CHAPTERS) {
                const dateStr = formatDate(currentDate);
                const isHoliday = state.holidays.includes(dateStr);
                const card = document.createElement('div');
                card.className = 'card';

                if (isHoliday) {
                    card.classList.add('holiday-active');
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-date">📅 ${dateStr} (一)</div>
                            <span class="badge badge-holiday">放假休息</span>
                        </div>
                        <div class="card-body">
                            <div class="book-info">${BOOK_NAME}</div>
                            <div class="chapter-title" style="color: var(--danger);">😴 本週不讀書，進度順延</div>
                        </div>
                        <div class="card-footer">
                            <div class="footer-actions">
                                <div class="switch-container">
                                    <span>📝 備註</span>
                                    <label class="switch switch-note">
                                        <input type="checkbox" onchange="toggleNoteView('${dateStr}', this)" ${state.noteToggles[dateStr] ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </div>
                                <div class="switch-container">
                                    <span style="color: var(--danger);">恢復進度</span>
                                    <label class="switch">
                                        <input type="checkbox" checked onchange="toggleHoliday('${dateStr}')">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                            <div class="note-container" id="note-container-${dateStr}" style="display: ${state.noteToggles[dateStr] ? 'block' : 'none'}; width: 100%;">
                                <textarea placeholder="請輸入放假原因或備註..." onchange="handleNoteChange('${dateStr}', this.value)" rows="2" class="note-textarea">${state.notes[dateStr] || ''}</textarea>
                            </div>
                        </div>
                    `;
                } else {
                    const defaultLeader = state.members[activeSessionCount % state.members.length];
                    const currentLeader = state.substitutes[dateStr] || defaultLeader;
                    const isSubstitute = state.substitutes[dateStr] && state.substitutes[dateStr] !== defaultLeader;

                    if (isSubstitute) card.classList.add('substitute-active');

                    let optionsHtml = '';
                    [...state.members, '其他'].forEach(m => {
                        optionsHtml += `<option value="${m}" ${m === currentLeader ? 'selected' : ''}>${m}</option>`;
                    });

                    const chapterName = CHAPTER_TITLES[currentChapter - 1];

                    card.innerHTML = `
                        ${isSubstitute ? '<span class="status-tag tag-sub">代班中</span>' : ''}
                        <div class="card-header">
                            <div class="card-date">📅 ${dateStr} (一)</div>
                            <span class="badge badge-chapter">第 ${currentChapter} / ${TOTAL_CHAPTERS} 週</span>
                        </div>
                        <div class="card-body">
                            <div class="book-info">${BOOK_NAME}</div>
                            <div class="chapter-title">${chapterName}</div>
                        </div>
                        <div class="card-footer">
                            <div class="select-wrapper">
                                <select class="select-leader" onchange="handleLeaderChange('${dateStr}', '${defaultLeader}', this.value)">
                                    ${optionsHtml}
                                </select>
                            </div>
                            <div class="footer-actions">
                                <div class="switch-container">
                                    <span>📝 備註</span>
                                    <label class="switch switch-note">
                                        <input type="checkbox" onchange="toggleNoteView('${dateStr}', this)" ${state.noteToggles[dateStr] ? 'checked' : ''}>
                                        <span class="slider"></span>
                                    </label>
                                </div>
                                <div class="switch-container">
                                    <span>放假</span>
                                    <label class="switch">
                                        <input type="checkbox" onchange="toggleHoliday('${dateStr}')">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                            <div class="note-container" id="note-container-${dateStr}" style="display: ${state.noteToggles[dateStr] ? 'block' : 'none'}; width: 100%;">
                                <textarea placeholder="請輸入備註內容..." onchange="handleNoteChange('${dateStr}', this.value)" rows="2" class="note-textarea">${state.notes[dateStr] || ''}</textarea>
                            </div>
                        </div>
                    `;
                    currentChapter++;
                    activeSessionCount++;
                }
                container.appendChild(card);
                currentDate = addDays(currentDate, 7);
            }
        }

        async function toggleHoliday(dateStr) {
            const index = state.holidays.indexOf(dateStr);
            if (index > -1) {
                state.holidays.splice(index, 1);
                renderSchedule(); 
                await saveToCloud('delete', 'holiday', dateStr);
            } else {
                state.holidays.push(dateStr);
                renderSchedule();
                await saveToCloud('save', 'holiday', dateStr, 'true');
            }
        }

        async function handleLeaderChange(dateStr, defaultLeader, selectedLeader) {
            if (selectedLeader === defaultLeader) {
                delete state.substitutes[dateStr];
                renderSchedule();
                await saveToCloud('delete', 'substitute', dateStr);
            } else {
                state.substitutes[dateStr] = selectedLeader;
                renderSchedule();
                await saveToCloud('save', 'substitute', dateStr, selectedLeader);
            }
        }

        function toggleNoteView(dateStr, checkbox) {
            state.noteToggles[dateStr] = checkbox.checked;
            const container = document.getElementById('note-container-' + dateStr);
            if(container) container.style.display = checkbox.checked ? 'block' : 'none';
        }

        async function handleNoteChange(dateStr, value) {
            state.notes[dateStr] = value;
            if(!value.trim()) {
                await saveToCloud('delete', 'note', dateStr);
            } else {
                await saveToCloud('save', 'note', dateStr, value);
            }
        }

        window.onload = function() {
            initMemberHeader();
            fetchCloudData();
        };
    </script>
</body>
</html>
